<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff6b9d" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="ba" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c44dff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c44dff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="bd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6b9dff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6b9dff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="bw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#c44dff" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="ag1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#c44dff"/>
    </linearGradient>
    <linearGradient id="ag2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c44dff"/>
      <stop offset="100%" stop-color="#6b9dff"/>
    </linearGradient>
    <linearGradient id="pipBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d0d1a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a0a15" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Frontend box -->
  <rect x="290" y="15" width="220" height="46" rx="10" fill="url(#bf)" stroke="#ff6b9d" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <text x="400" y="43" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ff6b9d" text-anchor="middle" font-weight="bold">🎨 Next.js 16 Frontend</text>

  <line x1="400" y1="61" x2="400" y2="85" stroke="#c44dff" stroke-width="2" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="0.8s" repeatCount="indefinite"/>
  </line>
  <polygon points="395,81 400,91 405,81" fill="#c44dff"/>

  <!-- API box -->
  <rect x="290" y="92" width="220" height="46" rx="10" fill="url(#ba)" stroke="#c44dff" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.7;0.3;0.7" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <text x="400" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#c44dff" text-anchor="middle" font-weight="bold">⚡ FastAPI Backend</text>

  <!-- Lines to workers -->
  <line x1="400" y1="138" x2="400" y2="155" stroke="#ff6b9d" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="400" y1="155" x2="200" y2="180" stroke="#ff6b9d" stroke-width="1.5" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="1.2s" repeatCount="indefinite"/>
  </line>
  <polygon points="195,176 200,186 205,176" fill="#ff6b9d"/>

  <line x1="400" y1="155" x2="600" y2="180" stroke="#6b9dff" stroke-width="1.5" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="1.2s" repeatCount="indefinite"/>
  </line>
  <polygon points="595,176 600,186 605,176" fill="#6b9dff"/>

  <!-- Data layer -->
  <rect x="100" y="188" width="200" height="46" rx="10" fill="url(#bd)" stroke="#6b9dff" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="200" y="216" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#6b9dff" text-anchor="middle" font-weight="bold">🗄️ PostgreSQL + Redis</text>

  <!-- Worker box -->
  <rect x="500" y="188" width="200" height="46" rx="10" fill="url(#bw)" stroke="#c44dff" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.7;0.3;0.7" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="600" y="216" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#c44dff" text-anchor="middle" font-weight="bold">⚙️ Celery Workers</text>

  <!-- Pipeline box -->
  <rect x="430" y="265" width="340" height="115" rx="14" fill="url(#pipBg)" stroke="#6b9dff" stroke-width="1" stroke-opacity="0.4"/>

  <text x="600" y="292" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#9080a8" text-anchor="middle" font-weight="600" letter-spacing="3">SCAN PIPELINE</text>

  <!-- Pipe: Crawl -->
  <rect x="450" y="308" width="56" height="30" rx="8" fill="#ff6b9d" fill-opacity="0.12" stroke="#ff6b9d" stroke-width="1">
    <animate attributeName="fill-opacity" values="0.12;0.3;0.12" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="478" y="327" font-family="Arial, sans-serif" font-size="10" fill="#ff6b9d" text-anchor="middle" font-weight="bold">🕸️ Crawl</text>

  <line x1="506" y1="323" x2="523" y2="323" stroke="#c44dff" stroke-width="1.5" stroke-dasharray="3,2">
    <animate attributeName="stroke-dashoffset" values="0;-10" dur="0.6s" repeatCount="indefinite"/>
  </line>

  <!-- Pipe: Detect -->
  <rect x="523" y="308" width="56" height="30" rx="8" fill="#c44dff" fill-opacity="0.12" stroke="#c44dff" stroke-width="1">
    <animate attributeName="fill-opacity" values="0.3;0.12;0.3" dur="2.2s" repeatCount="indefinite"/>
  </rect>
  <text x="551" y="327" font-family="Arial, sans-serif" font-size="10" fill="#c44dff" text-anchor="middle" font-weight="bold">🔍 Detect</text>

  <line x1="579" y1="323" x2="596" y2="323" stroke="#6b9dff" stroke-width="1.5" stroke-dasharray="3,2">
    <animate attributeName="stroke-dashoffset" values="0;-10" dur="0.6s" repeatCount="indefinite"/>
  </line>

  <!-- Pipe: Classify -->
  <rect x="596" y="308" width="56" height="30" rx="8" fill="#6b9dff" fill-opacity="0.12" stroke="#6b9dff" stroke-width="1">
    <animate attributeName="fill-opacity" values="0.12;0.3;0.12" dur="2.4s" repeatCount="indefinite"/>
  </rect>
  <text x="624" y="327" font-family="Arial, sans-serif" font-size="10" fill="#6b9dff" text-anchor="middle" font-weight="bold">🤖 Groq</text>

  <line x1="652" y1="323" x2="669" y2="323" stroke="#ff6b9d" stroke-width="1.5" stroke-dasharray="3,2">
    <animate attributeName="stroke-dashoffset" values="0;-10" dur="0.6s" repeatCount="indefinite"/>
  </line>

  <!-- Pipe: Gaps -->
  <rect x="523" y="344" width="56" height="30" rx="8" fill="#6b9dff" fill-opacity="0.12" stroke="#6b9dff" stroke-width="1">
    <animate attributeName="fill-opacity" values="0.3;0.12;0.3" dur="2.6s" repeatCount="indefinite"/>
  </rect>
  <text x="551" y="363" font-family="Arial, sans-serif" font-size="10" fill="#6b9dff" text-anchor="middle" font-weight="bold">📋 Gaps</text>

  <line x1="579" y1="359" x2="596" y2="359" stroke="#ff6b9d" stroke-width="1.5" stroke-dasharray="3,2">
    <animate attributeName="stroke-dashoffset" values="0;-10" dur="0.6s" repeatCount="indefinite"/>
  </line>

  <!-- Pipe: Report -->
  <rect x="596" y="344" width="60" height="30" rx="8" fill="#ff6b9d" fill-opacity="0.12" stroke="#ff6b9d" stroke-width="1">
    <animate attributeName="fill-opacity" values="0.12;0.3;0.12" dur="2.8s" repeatCount="indefinite"/>
  </rect>
  <text x="626" y="363" font-family="Arial, sans-serif" font-size="10" fill="#ff6b9d" text-anchor="middle" font-weight="bold">📄 Report</text>

  <!-- WS flow indicator -->
  <path d="M 400 138 Q 300 155 250 180" stroke="#6b9dff" stroke-width="1" stroke-dasharray="3,3" fill="none" opacity="0.3"/>
  <text x="310" y="170" font-family="Arial, sans-serif" font-size="8" fill="#6b9dff" opacity="0.4">WebSocket</text>
  <path d="M 400 138 Q 500 155 550 180" stroke="#c44dff" stroke-width="1" stroke-dasharray="3,3" fill="none" opacity="0.3"/>
  <text x="490" y="170" font-family="Arial, sans-serif" font-size="8" fill="#c44dff" opacity="0.4">Redis</text>

  <circle cx="200" cy="260" r="8" fill="none" stroke="#6b9dff" stroke-width="1" opacity="0.3">
    <animate attributeName="r" values="8;12;8" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.08;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="9" fill="#6b9dff" text-anchor="middle" opacity="0.4">data layer</text>

  <circle cx="600" cy="260" r="8" fill="none" stroke="#c44dff" stroke-width="1" opacity="0.3">
    <animate attributeName="r" values="8;12;8" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.08;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="9" fill="#c44dff" text-anchor="middle" opacity="0.4">task layer</text>
</svg>