<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 110" width="500" height="110">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="50%" stop-color="#c44dff"/>
      <stop offset="100%" stop-color="#6b9dff"/>
    </linearGradient>
    <linearGradient id="fl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0"/>
      <stop offset="20%" stop-color="#ff6b9d" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#c44dff" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#6b9dff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6b9dff" stop-opacity="0"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <text x="250" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="800" fill="url(#fg)" text-anchor="middle" letter-spacing="3">
    License
  </text>
  <text x="250" y="60" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#9080a8" text-anchor="middle" letter-spacing="1">
    MIT — freely use, modify, and distribute.
  </text>
  <line x1="100" y1="75" x2="400" y2="75" stroke="url(#fl)" stroke-width="1.5" stroke-linecap="round"/>
  <text x="250" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#6b5b7a" text-anchor="middle" letter-spacing="2">
    made with 
  </text>
  <text x="312" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ff6b9d" text-anchor="middle" font-weight="600">
    <animate attributeName="fill" values="#ff6b9d;#c44dff;#6b9dff;#ff6b9d" dur="2s" repeatCount="indefinite"/>
    passion
  </text>
  <text x="375" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#6b5b7a" text-anchor="middle" letter-spacing="2">
    for AI governance
  </text>
</svg>