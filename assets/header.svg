<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="900" height="240">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0d0d24"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b9d">
        <animate attributeName="stop-color" values="#ff6b9d;#ff4d7a;#c44dff;#6b9dff;#ff6b9d" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="25%" stop-color="#ff4d7a">
        <animate attributeName="stop-color" values="#ff4d7a;#c44dff;#6b9dff;#ff6b9d;#ff4d7a" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#c44dff">
        <animate attributeName="stop-color" values="#c44dff;#6b9dff;#ff6b9d;#ff4d7a;#c44dff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="75%" stop-color="#6b9dff">
        <animate attributeName="stop-color" values="#6b9dff;#ff6b9d;#ff4d7a;#c44dff;#6b9dff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#ff6b9d">
        <animate attributeName="stop-color" values="#ff6b9d;#ff4d7a;#c44dff;#6b9dff;#ff6b9d" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#c44dff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6b9dff" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#c44dff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6b9dff" stop-opacity="0.3"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a078c0"/>
      <stop offset="50%" stop-color="#c090d0"/>
      <stop offset="100%" stop-color="#a078c0"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="10" y="10" width="880" height="220" rx="20" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="2"/>

  <ellipse cx="450" cy="120" rx="350" ry="90" fill="url(#glowGrad)">
    <animate attributeName="rx" values="350;370;350" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="90;100;90" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <g opacity="0.6">
    <circle cx="150" cy="40" r="3" fill="#ff6b9d">
      <animate attributeName="cy" values="40;28;40" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="50" r="2.5" fill="#6b9dff">
      <animate attributeName="cy" values="50;36;50" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="200" r="4" fill="#c44dff">
      <animate attributeName="cy" values="200;186;200" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="195" r="2.5" fill="#ff6b9d">
      <animate attributeName="cy" values="195;183;195" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.15;0.5" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="25" r="2" fill="#6b9dff">
      <animate attributeName="cy" values="25;18;25" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="130" r="2" fill="#c44dff">
      <animate attributeName="cy" values="130;120;130" dur="3.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.15;0.5" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="140" r="2" fill="#ff6b9d">
      <animate attributeName="cy" values="140;130;140" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="35" r="1.5" fill="#6b9dff">
      <animate attributeName="cy" values="35;27;35" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.15;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="210" r="1.5" fill="#c44dff">
      <animate attributeName="cy" values="210;202;210" dur="2.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="520" cy="30" r="2" fill="#ff6b9d">
      <animate attributeName="cy" values="30;22;30" dur="3.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="180" r="2.5" fill="#6b9dff">
      <animate attributeName="cy" values="180;170;180" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g>
    <circle cx="300" cy="120" r="60" fill="none" stroke="#ff6b9d" stroke-width="0.5" opacity="0.15">
      <animate attributeName="r" values="60;70;60" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.05;0.15" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="120" r="60" fill="none" stroke="#6b9dff" stroke-width="0.5" opacity="0.15">
      <animate attributeName="r" values="60;70;60" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.05;0.15" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="450" y="118" font-family="'Segoe UI', Arial, sans-serif" font-size="76" font-weight="900" fill="url(#titleGrad)" text-anchor="middle" dominant-baseline="middle" letter-spacing="3" filter="url(#glowFilter)">
    ReguScan
    <animate attributeName="letter-spacing" values="3;6;3" dur="4s" repeatCount="indefinite"/>
  </text>

  <text x="450" y="160" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="url(#subGrad)" text-anchor="middle" letter-spacing="5" font-weight="600">
    EVIDENCE-BASED EU AI ACT READINESS SCANNER
    <animate attributeName="opacity" values="0.85;0.5;0.85" dur="3s" repeatCount="indefinite"/>
  </text>

  <line x1="250" y1="180" x2="650" y2="180" stroke="url(#titleGrad)" stroke-width="1.5">
    <animate attributeName="x1" values="300;250;300" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="600;650;600" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
  </line>

  <text x="450" y="205" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#6b5b7a" text-anchor="middle" letter-spacing="3">
    crawl · detect · classify · remediate
  </text>
</svg>