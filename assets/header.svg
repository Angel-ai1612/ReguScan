<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04070d"/>
      <stop offset="50%" stop-color="#0a0a20"/>
      <stop offset="100%" stop-color="#04070d"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="25%" stop-color="#ff4d7a"/>
      <stop offset="50%" stop-color="#c44dff"/>
      <stop offset="75%" stop-color="#6b9dff"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
      <animate attributeName="x1" values="0%;100%0%" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#c44dff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6b9dff" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#c44dff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6b9dff" stop-opacity="0.3"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a078c0"/>
      <stop offset="50%" stop-color="#c090d0"/>
      <stop offset="100%" stop-color="#a078c0"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="10" y="10" width="880" height="240" rx="20" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="2"/>

  <!-- Scan lines overlay -->
  <g opacity="0.03">
    <line x1="10" y1="50" x2="890" y2="50" stroke="#6b9dff" stroke-width="0.5"/>
    <line x1="10" y1="90" x2="890" y2="90" stroke="#6b9dff" stroke-width="0.5"/>
    <line x1="10" y1="130" x2="890" y2="130" stroke="#6b9dff" stroke-width="0.5"/>
    <line x1="10" y1="170" x2="890" y2="170" stroke="#6b9dff" stroke-width="0.5"/>
    <line x1="10" y1="210" x2="890" y2="210" stroke="#6b9dff" stroke-width="0.5"/>
  </g>

  <!-- Corner accents -->
  <rect x="20" y="20" width="30" height="3" rx="1.5" fill="#ff6b9d" opacity="0.5"/>
  <rect x="20" y="20" width="3" height="30" rx="1.5" fill="#ff6b9d" opacity="0.5"/>
  <rect x="850" y="20" width="30" height="3" rx="1.5" fill="#6b9dff" opacity="0.5"/>
  <rect x="847" y="20" width="3" height="30" rx="1.5" fill="#6b9dff" opacity="0.5"/>
  <rect x="20" y="237" width="30" height="3" rx="1.5" fill="#c44dff" opacity="0.5"/>
  <rect x="20" y="230" width="3" height="30" rx="1.5" fill="#c44dff" opacity="0.5"/>
  <rect x="850" y="237" width="30" height="3" rx="1.5" fill="#ff6b9d" opacity="0.5"/>
  <rect x="847" y="230" width="3" height="30" rx="1.5" fill="#ff6b9d" opacity="0.5"/>

  <ellipse cx="450" cy="130" rx="350" ry="100" fill="url(#glowGrad)">
    <animate attributeName="rx" values="350;380;350" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="100;110;100" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Orbiting particles -->
  <g opacity="0.5">
    <circle cx="150" cy="35" r="2.5" fill="#ff6b9d">
      <animate attributeName="cy" values="35;25;35" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.15;0.7" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="45" r="2" fill="#6b9dff">
      <animate attributeName="cy" values="45;32;45" dur="4.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.15;0.6" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="220" r="3" fill="#c44dff">
      <animate attributeName="cy" values="220;208;220" dur="4.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="215" r="2" fill="#ff6b9d">
      <animate attributeName="cy" values="215;203;215" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="20" r="1.5" fill="#6b9dff">
      <animate attributeName="cy" values="20;14;20" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="140" r="1.5" fill="#c44dff">
      <animate attributeName="cy" values="140;128;140" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="150" r="2" fill="#ff6b9d">
      <animate attributeName="cy" values="150;138;150" dur="3.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="30" r="1.5" fill="#6b9dff">
      <animate attributeName="cy" values="30;22;30" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="235" r="2" fill="#c44dff">
      <animate attributeName="cy" values="235;225;235" dur="3.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Pulse rings -->
  <g>
    <circle cx="280" cy="130" r="55" fill="none" stroke="#ff6b9d" stroke-width="0.5" opacity="0.12">
      <animate attributeName="r" values="55;65;55" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.12;0.03;0.12" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="130" r="55" fill="none" stroke="#6b9dff" stroke-width="0.5" opacity="0.12">
      <animate attributeName="r" values="55;65;55" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.12;0.03;0.12" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Shield icon -->
  <g transform="translate(425, 115)" filter="url(#softGlow)">
    <path d="M0,-30 L20,-20 L20,5 C20,15 10,25 0,28 C-10,25 -20,15 -20,5 L-20,-20 Z" fill="none" stroke="url(#titleGrad)" stroke-width="1.5" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite"/>
    </path>
    <line x1="-8" y1="-8" x2="8" y2="-8" stroke="#ff6b9d" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="-8" y1="-2" x2="8" y2="-2" stroke="#c44dff" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="-5" y1="4" x2="5" y2="4" stroke="#6b9dff" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
    </line>
  </g>

  <text x="450" y="128" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="900" fill="url(#titleGrad)" text-anchor="middle" dominant-baseline="middle" letter-spacing="3" filter="url(#glowFilter)">
    ReguScan
    <animate attributeName="letter-spacing" values="3;6;3" dur="4s" repeatCount="indefinite"/>
  </text>

  <text x="450" y="168" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="url(#subGrad)" text-anchor="middle" letter-spacing="6" font-weight="600">
    EU AI ACT READINESS SCANNER
    <animate attributeName="opacity" values="0.85;0.45;0.85" dur="3s" repeatCount="indefinite"/>
  </text>

  <line x1="250" y1="188" x2="650" y2="188" stroke="url(#titleGrad)" stroke-width="1.5" stroke-linecap="round">
    <animate attributeName="x1" values="300;250;300" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="600;650;600" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="3s" repeatCount="indefinite"/>
  </line>

  <text x="450" y="215" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#5a4a70" text-anchor="middle" letter-spacing="4" font-weight="600">
    crawl · detect · classify · remediate
  </text>
</svg>