<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="rp" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#c44dff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6b9dff" stop-opacity="0.4"/>
